<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeasureTool — Image Measurement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d14;
    --surface:   #13131f;
    --panel:     #16182a;
    --border:    #252840;
    --cyan:      #00e5ff;
    --cyan-dim:  #00a8bb;
    --green:     #6dffb3;
    --green-dim: #2d6644;
    --red:       #ff6b6b;
    --red-dim:   #6b2020;
    --amber:     #ffcc44;
    --amber-dim: #5a3800;
    --text:      #c8cce8;
    --muted:     #50546a;
    --font-mono: 'JetBrains Mono', monospace;
    --font-head: 'Syne', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .sep {
    width: 1px; height: 28px;
    background: var(--border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  .tb-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Buttons */
  .tb-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border: none; border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    transition: filter .15s, transform .1s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tb-btn:hover  { filter: brightness(1.25); }
  .tb-btn:active { transform: scale(.97); }
  .tb-btn.active { outline: 2px solid var(--cyan); outline-offset: 1px; }

  .btn-paste   { background: #0f2a50; color: #c0e0ff; }
  .btn-dist    { background: var(--green-dim); color: var(--green); }
  .btn-dist.active { background: #1a4d30; }
  .btn-size    { background: var(--red-dim);   color: var(--red);   }
  .btn-size.active { background: #5a1515; }
  .btn-rotate  {
    background: #1a1a3a; color: #a0a8e0;
    font-size: 16px; padding: 4px 10px;
  }
  .btn-reset   { background: var(--amber-dim); color: var(--amber);
                 font-size: 10px; padding: 5px 10px; }

  /* Inputs */
  .tb-input {
    background: #090912;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--cyan);
    font-family: var(--font-mono);
    font-size: 12px; font-weight: 600;
    padding: 5px 8px;
    width: 88px;
    flex-shrink: 0;
    transition: border-color .2s;
    outline: none;
  }
  .tb-input:focus { border-color: var(--cyan-dim); }
  .tb-input.disp  {
    color: var(--cyan-dim);
    background: #07070f;
    cursor: default;
    pointer-events: none;
  }
  .tb-input::placeholder { color: var(--muted); }

  /* ── Canvas area ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  #canvas {
    display: block;
    width: 100%; height: 100%;
    cursor: crosshair;
  }

  /* Zoom-reset pill — floats top-right of canvas */
  #btn-reset-zoom {
    position: absolute;
    top: 12px; right: 14px;
    display: none;
    z-index: 10;
  }

  /* Free-rotate handle */
  #rotate-handle {
    position: absolute;
    top: 50px; right: 14px;
    display: none;           /* shown via JS when image loaded */
    z-index: 10;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: #1a1230;
    border: 1px solid #3a2a6a;
    border-radius: 6px;
    color: #b090ff;
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    cursor: grab;
    user-select: none;
    transition: background .15s, border-color .15s;
  }
  #rotate-handle:hover   { background: #231840; border-color: #7050c0; }
  #rotate-handle.dragging {
    cursor: grabbing;
    background: #2d1f55;
    border-color: #9060e0;
    color: #c8a8ff;
  }
  #rotate-deg { min-width: 34px; text-align: right; }

  /* Drop overlay */
  #drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    pointer-events: none;
    transition: opacity .3s;
  }
  #drop-overlay.hidden { opacity: 0; }

  .drop-icon {
    font-size: 56px;
    opacity: .18;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .drop-title {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 800;
    color: var(--text);
    opacity: .22;
    letter-spacing: .5px;
  }
  .drop-sub {
    font-size: 11px; color: var(--muted);
    opacity: .7;
  }

  /* Drag-over highlight */
  #canvas-wrap.dragover { outline: 2px dashed var(--cyan); }

  /* ── Status bar ── */
  #statusbar {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 4px 14px;
    background: #0a0a10;
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted);
    flex-shrink: 0;
  }
  #status-left  { color: #4a9aaa; }
  #status-right { color: var(--muted); }
</style>
</head>
<body>
<div id="app">

  <!-- ── TOOLBAR ── -->
  <div id="toolbar">

    <!-- Paste -->
    <button class="tb-btn btn-paste" id="btn-paste" title="Ctrl+V also works">
      📋 Paste from Clipboard
    </button>

    <div class="sep"></div>

    <!-- Distance input -->
    <span class="tb-label">Distance:</span>
    <input class="tb-input" id="inp-dist" type="text" inputmode="decimal"
           placeholder="e.g. 50" title="Real-world length in mm">
    <span class="tb-label">mm</span>

    <!-- Distance button -->
    <button class="tb-btn btn-dist" id="btn-dist">📏 Distance</button>

    <div class="sep"></div>

    <!-- Compute Size -->
    <button class="tb-btn btn-size" id="btn-size">📐 Compute Size</button>

    <!-- W -->
    <span class="tb-label">W:</span>
    <input class="tb-input disp" id="out-w" type="text" readonly placeholder="—">
    <span class="tb-label">mm</span>

    <!-- H -->
    <span class="tb-label">H:</span>
    <input class="tb-input disp" id="out-h" type="text" readonly placeholder="—">
    <span class="tb-label">mm</span>

    <!-- Diagonal -->
    <span class="tb-label">⌀:</span>
    <input class="tb-input disp" id="out-diag" type="text" readonly placeholder="—">
    <span class="tb-label">inch</span>

    <!-- Ratio -->
    <span class="tb-label">Ratio:</span>
    <input class="tb-input disp" id="out-ratio" type="text" readonly placeholder="—" title="short ÷ long, rounded to 1 decimal place">

  </div>

  <!-- ── CANVAS ── -->
  <div id="canvas-wrap" tabindex="0">
    <canvas id="canvas"></canvas>

    <!-- Zoom reset pill (shows when zoomed) -->
    <button class="tb-btn btn-reset" id="btn-reset-zoom">⊙ Reset Zoom</button>

    <!-- Free-rotate handle (always visible when image loaded) -->
    <div id="rotate-handle" title="Hold and drag to rotate freely">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6"/>
        <path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/>
      </svg>
      <span id="rotate-deg">0°</span>
    </div>

    <!-- Empty-state overlay -->
    <div id="drop-overlay">
      <div class="drop-icon">📐</div>
      <div class="drop-title">MeasureTool</div>
      <div class="drop-sub">Paste an image (Ctrl+V) or drag &amp; drop a file</div>
    </div>
  </div>

  <!-- ── STATUS ── -->
  <div id="statusbar">
    <span id="status-left">Ready — paste an image to begin.</span>
    <span id="status-right">Scroll=zoom · Right-drag=pan · ↻ handle=free rotate</span>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────
const MM_PER_INCH = 25.4;
const ZOOM_STEP  = 1.15;
const ZOOM_MIN   = 0.02;
const ZOOM_MAX   = 60;

// ─────────────────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────────────────
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const wrap        = document.getElementById('canvas-wrap');
const overlay     = document.getElementById('drop-overlay');
const btnPaste    = document.getElementById('btn-paste');
const btnDist     = document.getElementById('btn-dist');
const btnSize     = document.getElementById('btn-size');
const btnReset    = document.getElementById('btn-reset-zoom');
const rotHandle   = document.getElementById('rotate-handle');
const rotDegLbl   = document.getElementById('rotate-deg');
const inpDist     = document.getElementById('inp-dist');
const outW        = document.getElementById('out-w');
const outH        = document.getElementById('out-h');
const outDiag     = document.getElementById('out-diag');
const outRatio    = document.getElementById('out-ratio');
const statusLeft  = document.getElementById('status-left');

// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let img       = null;    // HTMLImageElement
let zoom      = 1;
let panX      = 0, panY = 0;
let fitZoom   = 1;       // zoom level at "fit" state
let rotRad    = 0;       // visual rotation in RADIANS (free, display-only)

let scaleImgPx = null;   // calibration line length in image-pixels
let scaleRealMm = null;  // real-world mm

let mode      = null;    // 'dist' | 'bbox'
let dragStart = null;    // {x, y} in canvas coords
let dragEnd   = null;

// Stored overlay drawings (in image-pixel coords)
let calCoords  = null;   // {x1,y1,x2,y2}
let bboxCoords = null;   // {x1,y1,x2,y2}

// ─────────────────────────────────────────────────────────
// Canvas sizing
// ─────────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  redraw();
}
window.addEventListener('resize', resizeCanvas);

// ─────────────────────────────────────────────────────────
// Coord helpers — free rotation
// We treat the image as drawn centred at (panX, panY) (image centre in canvas)
// and rotated by rotRad around that centre.
// ─────────────────────────────────────────────────────────

// Canvas coords → original image-pixel coords
function canvasToImg(cx, cy) {
  // translate so image centre is origin
  const dx = cx - panX;
  const dy = cy - panY;
  // un-rotate
  const cos = Math.cos(-rotRad), sin = Math.sin(-rotRad);
  const rx  = dx * cos - dy * sin;
  const ry  = dx * sin + dy * cos;
  // shift from image-centre origin to image top-left origin
  return { x: rx + img.width / 2, y: ry + img.height / 2 };
}

// Original image-pixel coords → canvas coords
function imgToCanvas(ix, iy) {
  const dx  = ix - img.width  / 2;
  const dy  = iy - img.height / 2;
  const cos = Math.cos(rotRad), sin = Math.sin(rotRad);
  return {
    x: dx * cos - dy * sin + panX,
    y: dx * sin + dy * cos + panY,
  };
}

// ─────────────────────────────────────────────────────────
// Fit image to canvas
// panX/panY = canvas position of the IMAGE CENTRE
// ─────────────────────────────────────────────────────────
function fitImage() {
  const cw = canvas.width, ch = canvas.height;
  zoom  = Math.min(cw / img.width, ch / img.height, 1);
  panX  = cw / 2;
  panY  = ch / 2;
  fitZoom = zoom;
  updateResetBtn();
}

// ─────────────────────────────────────────────────────────
// Load image from various sources
// ─────────────────────────────────────────────────────────
function loadImage(src) {
  const image = new Image();
  image.onload = () => {
    img = image;
    overlay.classList.add('hidden');
    scaleImgPx = null; scaleRealMm = null;
    calCoords = null; bboxCoords = null;
    rotRad = 0;
    rotDegLbl.textContent = '0°';
    rotHandle.style.display = 'flex';
    clearResults();
    fitImage();
    redraw();
    setStatus(`Image loaded: ${img.width}×${img.height} px — enter mm then 📏 Distance to calibrate.`);
  };
  image.src = src;
}

function loadBlob(blob) {
  const url = URL.createObjectURL(blob);
  loadImage(url);
}

// ─────────────────────────────────────────────────────────
// Paste from clipboard
// ─────────────────────────────────────────────────────────
async function pasteFromClipboard() {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      const type = item.types.find(t => t.startsWith('image/'));
      if (type) {
        const blob = await item.getType(type);
        loadBlob(blob);
        return;
      }
    }
    alert('No image found in clipboard.\nCopy an image first (e.g. screenshot).');
  } catch {
    alert('Clipboard access denied.\nUse Ctrl+V or drag & drop an image file.');
  }
}

document.addEventListener('paste', e => {
  const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
  if (item) loadBlob(item.getAsFile());
});

btnPaste.addEventListener('click', pasteFromClipboard);

// ─────────────────────────────────────────────────────────
// Free-rotate handle — drag to spin image around its centre
// ─────────────────────────────────────────────────────────
let rotDrag = null;  // { startAngle, startRad }

rotHandle.addEventListener('mousedown', e => {
  if (!img) return;
  e.preventDefault();
  e.stopPropagation();
  const rect = canvas.getBoundingClientRect();
  const startAngle = Math.atan2(e.clientY - rect.top - panY, e.clientX - rect.left - panX);
  rotDrag = { startAngle, startRad: rotRad };
  rotHandle.classList.add('dragging');
  canvas.style.cursor = 'grabbing';
});

// ─────────────────────────────────────────────────────────
// Drag & Drop file
// ─────────────────────────────────────────────────────────
wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.classList.add('dragover'); });
wrap.addEventListener('dragleave', () => wrap.classList.remove('dragover'));
wrap.addEventListener('drop', e => {
  e.preventDefault();
  wrap.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadBlob(file);
});

// ─────────────────────────────────────────────────────────
// Results UI
// ─────────────────────────────────────────────────────────
function setResults(wMm, hMm) {
  outW.value    = wMm    != null ? wMm.toFixed(2)                           : '';
  outH.value    = hMm    != null ? hMm.toFixed(2)                           : '';
  outDiag.value = (wMm != null && hMm != null)
    ? (Math.hypot(wMm, hMm) / MM_PER_INCH).toFixed(3) : '';
  if (wMm != null && hMm != null && wMm > 0 && hMm > 0) {
    const shorter = Math.min(wMm, hMm);
    const longer  = Math.max(wMm, hMm);
    outRatio.value = (shorter / longer).toFixed(1);
  } else {
    outRatio.value = '';
  }
  outW.placeholder     = wMm    != null ? '' : '—';
  outH.placeholder     = hMm    != null ? '' : '—';
  outDiag.placeholder  = (wMm != null && hMm != null) ? '' : '—';
  outRatio.placeholder = (wMm != null && hMm != null) ? '' : '—';
}
function clearResults() { setResults(null, null); }

// ─────────────────────────────────────────────────────────
// Status
// ─────────────────────────────────────────────────────────
function setStatus(msg) { statusLeft.textContent = msg; }

// ─────────────────────────────────────────────────────────
// Zoom reset button
// ─────────────────────────────────────────────────────────
function updateResetBtn() {
  const cw = canvas.width, ch = canvas.height;
  const centred = Math.abs(panX - cw / 2) < 2 && Math.abs(panY - ch / 2) < 2;
  const atFit   = Math.abs(zoom - fitZoom) < 0.001;
  btnReset.style.display = (img && (!atFit || !centred)) ? 'block' : 'none';
}

btnReset.addEventListener('click', () => {
  fitImage();
  redraw();
  setStatus('Zoom reset to fit.');
});

// ─────────────────────────────────────────────────────────
// Zoom (scroll)
// ─────────────────────────────────────────────────────────
wrap.addEventListener('wheel', e => {
  if (!img) return;
  e.preventDefault();
  const direction = e.deltaY < 0 ? 1 : -1;
  const factor    = direction > 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
  const newZoom   = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom * factor));
  if (newZoom === zoom) return;

  const rect = canvas.getBoundingClientRect();
  const cx   = e.clientX - rect.left;
  const cy   = e.clientY - rect.top;
  // panX/panY is image centre; scale distance from cursor to centre
  panX = cx + (panX - cx) * (newZoom / zoom);
  panY = cy + (panY - cy) * (newZoom / zoom);
  zoom = newZoom;

  redraw();
  updateResetBtn();
  setStatus(`Zoom: ${(zoom * 100).toFixed(0)}%`);
}, { passive: false });

// ─────────────────────────────────────────────────────────
// Pan (right-click drag)
// ─────────────────────────────────────────────────────────
let panDrag = null;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  if (e.button === 2 || e.button === 1) {
    panDrag = { sx: e.clientX, sy: e.clientY, px: panX, py: panY };
  }
});
window.addEventListener('mousemove', e => {
  if (rotDrag) {
    const rect  = canvas.getBoundingClientRect();
    const angle = Math.atan2(e.clientY - rect.top - panY, e.clientX - rect.left - panX);
    rotRad = rotDrag.startRad + (angle - rotDrag.startAngle);
    const deg = ((rotRad * 180 / Math.PI) % 360 + 360) % 360;
    rotDegLbl.textContent = deg.toFixed(1) + '°';
    redraw();
    return;
  }
  if (!panDrag) return;
  panX = panDrag.px + (e.clientX - panDrag.sx);
  panY = panDrag.py + (e.clientY - panDrag.sy);
  redraw();
  updateResetBtn();
});
window.addEventListener('mouseup', e => {
  if (rotDrag) {
    rotDrag = null;
    rotHandle.classList.remove('dragging');
    canvas.style.cursor = mode ? 'crosshair' : 'default';
    const deg = ((rotRad * 180 / Math.PI) % 360 + 360) % 360;
    setStatus(`Rotated ${deg.toFixed(1)}° — measurements stay in original image coords.`);
  }
  if (e.button === 2 || e.button === 1) panDrag = null;
});

// ─────────────────────────────────────────────────────────
// Mode buttons
// ─────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  btnDist.classList.toggle('active', m === 'dist');
  btnSize.classList.toggle('active', m === 'bbox');
  canvas.style.cursor = m ? 'crosshair' : 'default';
}

btnDist.addEventListener('click', () => {
  if (!img) { alert('Paste an image first.'); return; }
  const val = parseFloat(inpDist.value);
  if (!val || val <= 0) { alert('Enter a valid real-world distance (mm).'); return; }
  scaleRealMm = val;
  setMode('dist');
  setStatus(`Mode: Distance — drag a line = ${scaleRealMm} mm`);
});

btnSize.addEventListener('click', () => {
  if (!img) { alert('Paste an image first.'); return; }
  if (!scaleImgPx) { alert('Draw a Distance calibration line first.'); return; }
  clearResults();
  setMode('bbox');
  setStatus('Mode: Compute Size — drag a rectangle, W/H/⌀ update live.');
});

// Only allow numeric input
inpDist.addEventListener('input', () => {
  inpDist.value = inpDist.value.replace(/[^0-9.]/g, '');
});

// ─────────────────────────────────────────────────────────
// Measurement drag (left-click)
// ─────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0 || !mode || !img) return;
  const rect = canvas.getBoundingClientRect();
  dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  dragEnd   = { ...dragStart };
});

window.addEventListener('mousemove', e => {
  if (!dragStart || !mode) return;
  const rect = canvas.getBoundingClientRect();
  dragEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  redraw();

  if (mode === 'bbox' && scaleImgPx) {
    const { wMm, hMm } = computeBbox(dragStart, dragEnd);
    setResults(wMm, hMm);
  }
});

window.addEventListener('mouseup', e => {
  if (e.button !== 0 || !dragStart || !mode) return;
  const rect = canvas.getBoundingClientRect();
  const end  = { x: e.clientX - rect.left, y: e.clientY - rect.top };

  if (mode === 'dist') {
    const p1 = canvasToImg(dragStart.x, dragStart.y);
    const p2 = canvasToImg(end.x, end.y);
    const len = Math.hypot(p2.x - p1.x, p2.y - p1.y);
    if (len < 3) { setStatus('Line too short — try again.'); dragStart = null; return; }
    scaleImgPx = len;
    calCoords  = { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
    const ratio = scaleRealMm / scaleImgPx;
    setStatus(`Calibration done: ${scaleImgPx.toFixed(1)} img-px = ${scaleRealMm} mm (${ratio.toFixed(4)} mm/px) — now 📐 Compute Size.`);
    setMode(null);
  } else if (mode === 'bbox') {
    const { wMm, hMm } = computeBbox(dragStart, end);
    if (Math.abs(end.x - dragStart.x) < 3 || Math.abs(end.y - dragStart.y) < 3) {
      setStatus('Box too small — try again.'); dragStart = null; return;
    }
    // Store anchor corners in IMAGE coords so bbox survives zoom/pan changes
    const p1 = canvasToImg(dragStart.x, dragStart.y);
    const p2 = canvasToImg(end.x, dragStart.y);
    const p3 = canvasToImg(end.x, end.y);
    const p4 = canvasToImg(dragStart.x, end.y);
    bboxCoords = { p1, p2, p3, p4, wMm, hMm };
    setResults(wMm, hMm);
    const diag = (Math.hypot(wMm, hMm) / MM_PER_INCH).toFixed(3);
    setStatus(`Result: W=${wMm.toFixed(2)} mm  H=${hMm.toFixed(2)} mm  ⌀=${diag}"`);
    setMode(null);
  }

  dragStart = null;
  dragEnd   = null;
  redraw();
});

function computeBbox(start, end) {
  const p1 = canvasToImg(start.x, start.y);
  const p2 = canvasToImg(end.x,   end.y);
  const ratio = scaleRealMm / scaleImgPx;
  const wMm   = Math.abs(p2.x - p1.x) * ratio;
  const hMm   = Math.abs(p2.y - p1.y) * ratio;
  return { wMm, hMm, p1, p2 };
}

// ─────────────────────────────────────────────────────────
// Draw
// ─────────────────────────────────────────────────────────
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!img) return;

  // Image — centred at (panX, panY), scaled by zoom, rotated by rotRad
  ctx.save();
  ctx.translate(panX, panY);
  ctx.rotate(rotRad);
  ctx.scale(zoom, zoom);
  ctx.drawImage(img, -img.width / 2, -img.height / 2);
  ctx.restore();

  // Calibration line (stored)
  if (calCoords) drawCalLine(calCoords);

  // Bbox (stored)
  if (bboxCoords) drawBbox(bboxCoords, true);

  // Active drag
  if (dragStart && dragEnd && mode) {
    if (mode === 'dist') drawActiveLine(dragStart, dragEnd);
    if (mode === 'bbox') drawActiveBbox(dragStart, dragEnd);
  }
}

function drawCalLine(c) {
  const a = imgToCanvas(c.x1, c.y1);
  const b = imgToCanvas(c.x2, c.y2);
  ctx.save();
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.stroke();
  // endpoints
  for (const p of [a, b]) {
    ctx.setLineDash([]);
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
  }
  // label
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 14;
  drawLabel(ctx, `↔ ${scaleRealMm} mm`, mx, my, '#00e5ff', '#001a20');
  ctx.restore();
}

function drawActiveLine(s, e) {
  ctx.save();
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
  ctx.restore();
}

function computeBbox(start, end) {
  // The 4 canvas-space corners of the axis-aligned rectangle
  const corners = [
    canvasToImg(start.x, start.y),
    canvasToImg(end.x,   start.y),
    canvasToImg(end.x,   end.y),
    canvasToImg(start.x, end.y),
  ];
  // Width = distance between top-left and top-right corners in image space
  // Height = distance between top-left and bottom-left corners in image space
  const wImg = Math.hypot(corners[1].x - corners[0].x, corners[1].y - corners[0].y);
  const hImg = Math.hypot(corners[3].x - corners[0].x, corners[3].y - corners[0].y);
  const ratio = scaleRealMm / scaleImgPx;
  return { wMm: wImg * ratio, hMm: hImg * ratio };
}

// bboxCoords stores 4 image-coord corners + cached wMm/hMm
function drawBbox(c, final) {
  // Project image coords → canvas coords
  const pts = [c.p1, c.p2, c.p3, c.p4].map(p => imgToCanvas(p.x, p.y));
  ctx.save();
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth   = 2;
  ctx.setLineDash(final ? [] : [6, 4]);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,107,107,0.07)';
  ctx.fill();
  ctx.restore();
  if (final) {
    const cx = pts.reduce((s, p) => s + p.x, 0) / 4;
    const cy = pts.reduce((s, p) => s + p.y, 0) / 4;
    const diag = (Math.hypot(c.wMm, c.hMm) / MM_PER_INCH).toFixed(3);
    drawLabel(ctx, `W:${c.wMm.toFixed(1)}mm  H:${c.hMm.toFixed(1)}mm\n⌀${diag}"`,
              cx, cy, '#ffcc44', '#1a1000');
  }
}

function drawActiveBbox(s, e) {
  // Draw screen-aligned rect directly in canvas coords
  const x = Math.min(s.x, e.x), y = Math.min(s.y, e.y);
  const w = Math.abs(e.x - s.x),  h = Math.abs(e.y - s.y);
  ctx.save();
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,107,107,0.07)';
  ctx.fillRect(x, y, w, h);
  ctx.restore();
  if (scaleImgPx) {
    const { wMm, hMm } = computeBbox(s, e);
    const diag = (Math.hypot(wMm, hMm) / MM_PER_INCH).toFixed(3);
    drawLabel(ctx, `W:${wMm.toFixed(1)}mm  H:${hMm.toFixed(1)}mm\n⌀${diag}"`,
              (s.x + e.x) / 2, (s.y + e.y) / 2, '#ffcc44', '#1a1000');
  }
}

function drawLabel(ctx, text, x, y, color, bg) {
  const lines    = text.split('\n');
  const fontSize = 12;
  ctx.save();
  ctx.font = `700 ${fontSize}px 'JetBrains Mono', monospace`;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  const padX = 8, padY = 5, lineH = fontSize + 3;
  const bh   = lines.length * lineH + padY * 2 - 3;
  const bx   = x - maxW / 2 - padX;
  const by   = y - bh / 2;
  // background
  ctx.fillStyle   = bg || '#001010';
  ctx.globalAlpha = 0.85;
  roundRect(ctx, bx, by, maxW + padX * 2, bh, 4);
  ctx.fill();
  ctx.globalAlpha = 1;
  // text
  ctx.fillStyle   = color;
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'top';
  lines.forEach((l, i) => ctx.fillText(l, x, by + padY + i * lineH));
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────
resizeCanvas();
</script>
